/* ============================================================
   Pierre Bretschneider Webdesign - Designsystem
   Farben, Typografie und Abstände als zentrale Variablen.
   Diese Werte lassen sich 1:1 in die Elementor Global Settings
   (Site Settings > Global Colors / Global Fonts) übertragen.
   ============================================================ */
:root {
  color-scheme: light;
  /* Farbwelt */
  --ink: #232325;            /* Anthrazit - Text, Footer, primäre Buttons */
  --ink-soft: #56534d;       /* warmes Grau - Fließtext sekundär */
  --paper: #ffffff;          /* Weiß */
  --warm: #f3f3f0;           /* "Stein" - ruhiges, leicht graues Off-White für Section-Hintergründe */
  --cream: #f7e9b5;          /* Creme - ruhige Karten, Footer-Logo */
  --cream-soft: #fbf4dc;     /* aufgehellte Creme für große Flächen */
  --neon: #f9ff5e;           /* Neon-Gelb - Akzente, Hover, Labels */
  --orange: #ffa237;         /* Orange - abstrakte Formen, Highlights */
  --bronze: #b57436;         /* Bronze - Linien, kleine Flächen, Icons */
  --bronze-text: #96591f;    /* abgedunkeltes Bronze für Textlabels (WCAG AA) */
  --line: rgba(35, 35, 37, 0.12);
  --shadow-card: 0 6px 24px rgba(35, 35, 37, 0.07), 0 2px 6px rgba(35, 35, 37, 0.05);
  --shadow-lift: 0 18px 44px rgba(35, 35, 37, 0.12);

  /* Radien */
  --r-xl: 32px;
  --r-lg: 26px;
  --r-md: 20px;
  --r-btn: 14px;

  /* Typografie */
  --font: 'Manrope', 'Segoe UI', system-ui, -apple-system, sans-serif;
  --fs-h1: clamp(2.75rem, 1.2rem + 4.6vw, 5.25rem);
  --fs-h2: clamp(2rem, 1rem + 3vw, 3.6rem);
  --fs-h3: clamp(1.3rem, 1.1rem + 0.7vw, 1.75rem);
  --fs-h4: clamp(1.1rem, 1rem + 0.4vw, 1.3rem);
  --fs-body: clamp(1.0625rem, 1rem + 0.25vw, 1.1875rem);
  --fs-small: 0.9375rem;
  --fs-label: 0.8125rem;

  /* Layout */
  --container: 1320px;
  --gutter: clamp(1.25rem, 4vw, 3rem);
  --sec-pad: clamp(4.25rem, 3rem + 5.5vw, 8rem);
  --nav-h: 88px;
}

*, *::before, *::after { box-sizing: border-box; }

html { scroll-behavior: smooth; }
html, body { overflow-x: clip; }

body {
  margin: 0;
  font-family: var(--font);
  font-size: var(--fs-body);
  line-height: 1.65;
  color: var(--ink);
  background: var(--paper);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}

img { max-width: 100%; height: auto; display: block; }
figure { margin: 0; }

main:focus { outline: none; }

h1, h2, h3, h4 {
  line-height: 1.08;
  letter-spacing: -0.025em;
  margin: 0 0 0.6em;
  font-weight: 800;
  text-wrap: balance;
}
h1 { font-size: var(--fs-h1); }
h2 { font-size: var(--fs-h2); }
h3 { font-size: var(--fs-h3); line-height: 1.2; }
h4 { font-size: var(--fs-h4); line-height: 1.3; font-weight: 700; }

p { margin: 0 0 1.1em; }
p:last-child { margin-bottom: 0; }

a { color: inherit; }

:focus-visible {
  outline: 3px solid var(--ink);
  outline-offset: 3px;
  border-radius: 4px;
}
.on-dark :focus-visible, footer :focus-visible { outline-color: var(--neon); }

.skip-link {
  position: absolute; left: -9999px; top: 0; z-index: 200;
  background: var(--neon); color: var(--ink); padding: 0.8rem 1.4rem;
  font-weight: 700; border-radius: 0 0 var(--r-btn) 0; text-decoration: none;
}
.skip-link:focus { left: 0; }

.container { max-width: var(--container); margin: 0 auto; padding-inline: var(--gutter); }
.container-narrow { max-width: 880px; margin-inline: auto; }

.section { padding-block: var(--sec-pad); }
.section--warm { background: var(--warm); }
.section--cream { background: var(--cream-soft); }
.section--dark { background: var(--ink); color: var(--warm); }

/* Eyebrow-Label über Überschriften */
.eyebrow {
  display: inline-flex; align-items: center; gap: 0.6rem;
  font-size: var(--fs-label); font-weight: 700;
  letter-spacing: 0.12em; text-transform: uppercase;
  color: var(--bronze-text); margin-bottom: 1.1rem;
}
.eyebrow::before {
  content: ""; width: 26px; height: 3px; border-radius: 2px; background: var(--orange);
}
.section--dark .eyebrow { color: var(--cream); }

.lead { font-size: clamp(1.15rem, 1.05rem + 0.5vw, 1.4rem); line-height: 1.55; color: var(--ink-soft); max-width: 46ch; }
.section--dark .lead { color: rgba(247, 246, 241, 0.78); }
.muted { color: var(--ink-soft); }

.sec-head { max-width: 780px; margin-bottom: clamp(2.2rem, 4vw, 3.75rem); }

/* Markierung in Headlines - bricht sauber um (box-decoration-break) */
.mark {
  background: linear-gradient(to top, var(--neon) 0.3em, transparent 0.3em);
  -webkit-box-decoration-break: clone; box-decoration-break: clone;
  padding-inline: 0.06em; margin-inline: -0.06em;
}

/* ================= Buttons ================= */
.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 0.55rem;
  font-family: var(--font); font-size: 1.0325rem; font-weight: 700;
  padding: 0.95rem 1.7rem; border-radius: var(--r-btn);
  text-decoration: none; cursor: pointer; border: 2px solid transparent;
  transition: background 0.2s ease, color 0.2s ease, transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
}
.btn svg { flex: none; transition: transform 0.2s ease; }
.btn:hover svg { transform: translateX(3px); }
.btn--primary { background: var(--ink); color: var(--warm); border-color: var(--ink); }
.btn--primary:hover { background: var(--neon); color: var(--ink); border-color: var(--neon); transform: translateY(-2px); }
.btn--ghost { background: transparent; color: var(--ink); border-color: var(--ink); }
.btn--ghost:hover { background: var(--ink); color: var(--warm); transform: translateY(-2px); }
.btn--on-dark.btn--primary { background: var(--neon); color: var(--ink); border-color: var(--neon); }
.btn--on-dark.btn--primary:hover { background: var(--warm); border-color: var(--warm); }
.btn--on-dark.btn--ghost { color: var(--warm); border-color: rgba(247, 246, 241, 0.55); }
.btn--on-dark.btn--ghost:hover { background: var(--warm); color: var(--ink); border-color: var(--warm); }
.btn--lg { padding: 1.1rem 2.1rem; font-size: 1.1rem; }

.btn-row { display: flex; flex-wrap: wrap; gap: 0.9rem; }

/* Text-Link mit Pfeil */
.arrow-link {
  display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 700;
  text-decoration: none; border-bottom: 2px solid var(--orange); padding-bottom: 2px;
}
.arrow-link:hover { border-bottom-color: var(--ink); }
.arrow-link:hover svg { transform: translateX(3px); }
.arrow-link svg { transition: transform 0.2s ease; }

/* ================= Navigation ================= */
.navbar {
  position: sticky; top: 0; z-index: 100;
  background: color-mix(in srgb, var(--ink) 94%, transparent);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border-bottom: 1px solid transparent;
  transition: border-color 0.25s ease, box-shadow 0.25s ease;
}
.navbar :focus-visible { outline-color: var(--neon); }
.navbar.is-scrolled { border-bottom-color: rgba(247, 246, 241, 0.14); box-shadow: 0 2px 18px rgba(0, 0, 0, 0.28); }
.navbar-inner {
  display: flex; align-items: center; justify-content: space-between; gap: 1.5rem;
  height: var(--nav-h);
  transition: height 0.25s ease;
}
.navbar.is-scrolled .navbar-inner { height: 68px; }
.nav-logo { display: flex; align-items: center; text-decoration: none; }
.nav-logo img { height: 118px; width: auto; transition: height 0.25s ease; }
.navbar.is-scrolled .nav-logo img { height: 96px; }
.nav-links { display: flex; align-items: center; gap: clamp(1rem, 2.4vw, 2.4rem); list-style: none; margin: 0; padding: 0; }
.nav-links a:not(.btn) {
  text-decoration: none; font-weight: 600; font-size: 1.0325rem; color: var(--warm);
  padding: 0.4rem 0.15rem; position: relative;
}
.nav-links a:not(.btn)::after {
  content: ""; position: absolute; left: 0; right: 100%; bottom: 0;
  height: 3px; background: var(--orange); border-radius: 2px;
  transition: right 0.22s ease;
}
.nav-links a:not(.btn):hover::after, .nav-links a[aria-current="page"]:not(.btn)::after { right: 0; }
.nav-links .btn { padding: 0.7rem 1.3rem; font-size: 0.975rem; }
/* CTA-Button in der dunklen Leiste: Neon statt Anthrazit */
.navbar .btn--primary { background: var(--neon); color: var(--ink); border-color: var(--neon); }
.navbar .btn--primary:hover { background: var(--warm); border-color: var(--warm); color: var(--ink); }

.burger {
  display: none; background: none; border: 0; cursor: pointer; padding: 0.6rem;
  border-radius: 10px;
}
.burger span { display: block; width: 26px; height: 3px; background: var(--warm); border-radius: 2px; margin: 5px 0; transition: transform 0.25s ease, opacity 0.2s ease; }
.burger[aria-expanded="true"] span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
.burger[aria-expanded="true"] span:nth-child(2) { opacity: 0; }
.burger[aria-expanded="true"] span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }

.mobile-menu {
  display: none;
  position: fixed; inset: var(--nav-h) 0 auto 0; z-index: 99;
  background: var(--ink); border-bottom: 1px solid rgba(247, 246, 241, 0.14);
  padding: 1rem var(--gutter) 2rem;
  box-shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
}
.mobile-menu.is-open { display: block; }
.mobile-menu ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 0.25rem; }
.mobile-menu a:not(.btn) {
  display: block; padding: 0.95rem 0.5rem; font-size: 1.2rem; font-weight: 700;
  text-decoration: none; border-radius: 12px; color: var(--warm);
}
.mobile-menu a:not(.btn):hover { background: rgba(247, 246, 241, 0.08); }
.mobile-menu a[aria-current="page"]:not(.btn) { color: var(--neon); }
.mobile-menu .btn { margin-top: 1rem; width: 100%; }

/* ================= Hero Startseite (dunkel & cineastisch) ================= */
.hero { background: var(--ink); position: relative; overflow: clip; }
.hero-inner {
  display: grid; grid-template-columns: minmax(0, 0.95fr) minmax(0, 1.05fr);
  gap: clamp(2rem, 4vw, 4rem); align-items: center;
  padding-top: clamp(2.5rem, 5vw, 4.5rem);
  min-height: min(84vh, 880px);
}
.hero h1 { color: var(--warm); font-size: clamp(2.75rem, 1.35rem + 3vw, 3.75rem); }
.hero .mark { background: none; padding: 0; margin: 0; color: var(--neon); }
.hero .lead { color: rgba(247, 246, 241, 0.75); }
.hero .eyebrow { color: var(--cream); }
.hero .hero-trust { color: rgba(247, 246, 241, 0.7); }
.hero .hero-trust svg { color: var(--neon); }
.hero .btn--primary { background: var(--neon); color: var(--ink); border-color: var(--neon); }
.hero .btn--primary:hover { background: var(--warm); border-color: var(--warm); }
.hero .btn--ghost { color: var(--warm); border-color: rgba(247, 246, 241, 0.55); }
.hero .btn--ghost:hover { background: var(--warm); color: var(--ink); border-color: var(--warm); }
.hero :focus-visible { outline-color: var(--neon); }
.hero-copy { padding-block: clamp(1.5rem, 3vw, 2.5rem) clamp(2.5rem, 5vw, 4rem); }
.hero-copy .lead { margin-top: 1.4rem; }
.hero-copy .btn-row { margin-top: 2.2rem; }
.hero-trust {
  display: flex; flex-wrap: wrap; gap: 0.6rem 1.6rem; margin-top: 2.1rem;
  padding: 0; list-style: none;
  font-size: var(--fs-small); font-weight: 600; color: var(--ink-soft);
}
.hero-trust li { display: inline-flex; align-items: center; gap: 0.45rem; }
.hero-trust svg { color: var(--bronze); flex: none; }

.hero-stage { position: relative; align-self: end; display: flex; justify-content: center; }
.hero-portrait { position: relative; z-index: 2; width: min(640px, 100%); }
/* Weicher, warmer Lichtschein hinter dem Portrait */
.hero-glow {
  position: absolute; z-index: 1; inset: 8% -12% 0 -12%; pointer-events: none;
  background: radial-gradient(58% 52% at 52% 68%, rgba(255, 162, 55, 0.32), rgba(181, 116, 54, 0.10) 55%, transparent 78%);
}

/* ================= Projekt-Banner (Marquee) ================= */
.marquee-section { padding-block: clamp(3.5rem, 5vw, 5.5rem); background: var(--paper); overflow: clip; }
.marquee-head { display: flex; flex-wrap: wrap; align-items: baseline; justify-content: space-between; gap: 0.75rem 2rem; margin-bottom: 2.4rem; }
.marquee-head p { margin: 0; }
.marquee { display: grid; gap: clamp(0.9rem, 1.4vw, 1.4rem); }
.marquee-row { display: flex; gap: clamp(0.9rem, 1.4vw, 1.4rem); width: max-content; will-change: transform; }
.m-card {
  width: clamp(280px, 32vw, 440px); flex: none;
  background: var(--paper); border: 1px solid var(--line);
  border-radius: var(--r-md); overflow: hidden; box-shadow: var(--shadow-card);
}
.m-card--tall { width: clamp(300px, 34vw, 470px); }
.m-card-bar {
  display: flex; align-items: center; gap: 0.45rem;
  padding: 0.6rem 0.9rem; background: var(--warm); border-bottom: 1px solid var(--line);
}
.m-card-bar i { width: 9px; height: 9px; border-radius: 50%; background: var(--line); }
.m-card-bar i:first-child { background: var(--orange); }
.m-card-url {
  margin-left: 0.4rem; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  font-size: 0.72rem; color: var(--ink-soft); background: var(--paper);
  border-radius: 999px; padding: 0.15rem 0.7rem; border: 1px solid var(--line);
}
.m-card img { width: 100%; aspect-ratio: 640 / 400; object-fit: cover; }
.m-card-meta { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; padding: 0.7rem 0.95rem; }
.m-card-meta strong { font-size: 0.9rem; }
.tag {
  font-size: 0.72rem; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase;
  padding: 0.22rem 0.65rem; border-radius: 999px; white-space: nowrap;
}
.tag--kunde { background: var(--neon); color: var(--ink); }
.tag--konzept { background: var(--warm); color: var(--ink-soft); border: 1px solid var(--line); }
.tag--launch { background: var(--cream); color: var(--bronze-text); }

/* Statischer Fallback bei reduzierter Bewegung */
.marquee.is-static .marquee-row { width: auto; overflow-x: auto; padding-bottom: 0.75rem; scroll-snap-type: x proximity; }
.marquee.is-static .m-card { scroll-snap-align: start; }

/* ================= Icon-Kachel (mehrfach verwendet) ================= */
.pillar-icon {
  width: 56px; height: 56px; border-radius: 16px; background: var(--cream-soft);
  border: 1px solid rgba(181, 116, 54, 0.25); color: var(--bronze);
  display: grid; place-items: center;
}

/* ================= Signal-Liste (Startseite: „Kommt Ihnen das bekannt vor?“) ================= */
.signal-list { display: grid; gap: 0; margin: 0; padding: 0; list-style: none; }
.signal {
  display: grid; grid-template-columns: 34px 1fr; gap: 1rem; align-items: start;
  padding: 1.15rem 0; border-bottom: 1px solid var(--line);
  font-size: clamp(1.05rem, 1rem + 0.35vw, 1.3rem); font-weight: 600; line-height: 1.45;
}
.signal:first-child { padding-top: 0.4rem; }
.signal:last-child { border-bottom: 0; }
.signal-dash { width: 22px; height: 3px; border-radius: 2px; background: var(--orange); margin-top: 0.72em; }

/* ================= Referenz-Karten ================= */
.case-grid { display: grid; grid-template-columns: 1fr 1fr; gap: clamp(1.25rem, 2.5vw, 2rem); }
.case-card {
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg);
  overflow: hidden; text-decoration: none; display: flex; flex-direction: column;
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}
.case-card:hover { transform: translateY(-4px); box-shadow: var(--shadow-lift); }
.case-card img { aspect-ratio: 1080 / 700; object-fit: cover; width: 100%; }
.case-card-body { padding: 1.6rem 1.9rem 1.9rem; display: grid; gap: 0.5rem; }
.case-card-body .tag { justify-self: start; }
.case-card h3 { margin: 0.3rem 0 0; }
.case-card p { color: var(--ink-soft); margin: 0; }
.case-card .arrow-link { margin-top: 0.9rem; justify-self: start; }

/* Große Fallstudien (Referenzseite) */
.case-study {
  display: grid; grid-template-columns: 1.05fr 0.95fr; gap: clamp(2rem, 4vw, 4rem);
  align-items: center;
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-xl);
  padding: clamp(1.5rem, 3vw, 3rem);
}
.case-study + .case-study { margin-top: clamp(2rem, 4vw, 3.5rem); }
.case-study--flip { grid-template-columns: 0.95fr 1.05fr; }
.case-study--flip .case-study-media { order: 2; }
.case-study-media { position: relative; }
.case-study-media > img { border-radius: var(--r-md); box-shadow: var(--shadow-lift); width: 100%; }
.case-study-media .mini-shot {
  position: absolute; right: -4%; bottom: -9%; width: 46%;
  border-radius: 14px; border: 4px solid var(--paper); box-shadow: var(--shadow-lift);
}
.case-study--flip .case-study-media .mini-shot { right: auto; left: -4%; }
.case-study-body h2 { font-size: clamp(1.6rem, 1.2rem + 1.4vw, 2.4rem); }
.case-facts { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.9rem 1.5rem; margin: 1.4rem 0; padding: 0; list-style: none; }
.case-facts li:nth-child(n+3) { grid-column: 1 / -1; }
.case-facts .label { display: block; font-size: var(--fs-label); font-weight: 700; letter-spacing: 0.09em; text-transform: uppercase; color: var(--bronze-text); margin-bottom: 0.15rem; }
.case-facts li { font-size: 0.995rem; color: var(--ink-soft); }
.case-tags { display: flex; flex-wrap: wrap; gap: 0.45rem; margin: 0 0 1.3rem; padding: 0; list-style: none; }
.case-tags li { font-size: 0.8rem; font-weight: 600; background: var(--warm); border: 1px solid var(--line); padding: 0.28rem 0.75rem; border-radius: 999px; }

/* ================= Kundenstimmen (Auszüge aus Google-Rezensionen) ================= */
.stars { display: inline-flex; gap: 3px; color: var(--orange); }
.case-quote {
  margin: 1.5rem 0 0; padding-left: 1.15rem; border-left: 3px solid var(--orange);
  display: grid; gap: 0.55rem; justify-items: start;
}
.case-quote p { margin: 0; font-size: 1.02rem; line-height: 1.6; color: var(--ink); }
.case-quote footer { font-size: 0.9rem; color: var(--ink-soft); }
.case-quote footer strong { display: block; color: var(--ink); }
.quote-card {
  margin: 0; background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: clamp(1.75rem, 3vw, 2.75rem); box-shadow: var(--shadow-card);
  display: grid; gap: 1rem; align-content: start; justify-items: start;
}
.quote-card blockquote { margin: 0; }
.quote-card blockquote p { margin: 0; font-size: clamp(1.05rem, 1rem + 0.3vw, 1.2rem); line-height: 1.62; color: var(--ink); }
.quote-card figcaption strong { display: block; }
.quote-card figcaption span { color: var(--ink-soft); font-size: 0.92rem; }

/* Platzhalter-Karten (Kundenstimme / künftige Referenz) */
.placeholder-card {
  border: 2px dashed rgba(181, 116, 54, 0.5); border-radius: var(--r-lg);
  background: var(--cream-soft); padding: clamp(1.75rem, 3vw, 2.75rem);
}
.placeholder-card .tag { margin-bottom: 0.9rem; }

/* ================= Prozess / Ablauf ================= */
.steps { display: grid; gap: 0; counter-reset: step; position: relative; margin: 0; padding: 0; list-style: none; }
.step {
  display: grid; grid-template-columns: 64px 1fr; gap: 1.5rem;
  padding: 1.5rem 0; border-bottom: 1px solid var(--line);
}
.step:last-child { border-bottom: 0; }
.step-num {
  counter-increment: step;
  width: 52px; height: 52px; border-radius: 50%; flex: none;
  background: var(--ink); color: var(--neon); font-weight: 800; font-size: 1.05rem;
  display: grid; place-items: center;
}
.step-num::before { content: counter(step, decimal-leading-zero); }
.step h3 { font-size: 1.25rem; margin: 0.55rem 0 0.3rem; }
.step p { color: var(--ink-soft); margin: 0; max-width: 62ch; }

/* ================= Über-Pierre / Split-Layouts ================= */
.split { display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: clamp(2.5rem, 5vw, 5rem); align-items: center; }
/* Über-mich: zentrierter Kopf, Foto links (Blick führt in den Text), Text rechts */
.sec-head--center { margin-inline: auto; text-align: center; }
.sec-head--center .lead { margin-inline: auto; }
.about-split { grid-template-columns: 0.95fr 1.05fr; }
.about-photo img { border-radius: var(--r-lg); box-shadow: var(--shadow-lift); width: 100%; }

.check-list { display: grid; gap: 0.85rem; margin: 1.5rem 0 0; padding: 0; list-style: none; }
.check-list li { display: grid; grid-template-columns: 28px 1fr; gap: 0.75rem; align-items: start; }
.check-list svg { color: var(--bronze); margin-top: 0.2rem; }
.check-list strong { display: block; }
.check-list span.sub { color: var(--ink-soft); font-size: 1.0rem; }

/* ================= Investition / Preis ================= */
.invest-card {
  display: grid; grid-template-columns: 1.1fr 0.9fr; gap: clamp(2rem, 4vw, 4rem);
  background: var(--ink); color: var(--warm); border-radius: var(--r-xl);
  padding: clamp(2.25rem, 4vw, 4rem);
  position: relative; overflow: clip;
}
.invest-card::after {
  content: ""; position: absolute; width: 380px; height: 380px; right: -140px; bottom: -190px;
  background: radial-gradient(circle at 30% 30%, var(--orange), var(--bronze));
  border-radius: 50%; opacity: 0.5;
}
.invest-card > * { position: relative; z-index: 1; }
.invest-price { font-size: clamp(2.6rem, 2rem + 2.4vw, 4.2rem); font-weight: 800; letter-spacing: -0.03em; line-height: 1; }
.invest-price small { display: block; font-size: 1rem; font-weight: 600; letter-spacing: 0.02em; margin-top: 0.7rem; color: var(--cream); }
.invest-card .check-list svg { color: var(--neon); }
.invest-card .check-list span.sub { color: rgba(247, 246, 241, 0.72); }

/* ================= FAQ ================= */
.faq-list { display: grid; gap: 0.8rem; max-width: 880px; }
.faq-item { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md); overflow: clip; }
.faq-q {
  width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 1rem;
  background: none; border: 0; cursor: pointer; text-align: left;
  font-family: var(--font); font-size: 1.1rem; font-weight: 700; color: var(--ink);
  padding: 1.25rem 1.5rem;
}
.faq-q .faq-icon {
  flex: none; width: 34px; height: 34px; border-radius: 50%;
  background: var(--cream-soft); border: 1px solid rgba(181, 116, 54, 0.3); color: var(--bronze);
  display: grid; place-items: center; transition: transform 0.25s ease, background 0.2s ease;
}
.faq-q[aria-expanded="true"] .faq-icon { transform: rotate(45deg); background: var(--neon); color: var(--ink); }
.faq-a { display: grid; grid-template-rows: 0fr; transition: grid-template-rows 0.3s ease; }
.faq-a > div { overflow: hidden; }
.faq-a p { padding: 0 1.5rem 1.4rem; color: var(--ink-soft); max-width: 68ch; }
.faq-item.is-open .faq-a { grid-template-rows: 1fr; }

/* ================= Leistungsseite ================= */
.page-hero { background: var(--warm); padding-block: clamp(4rem, 7vw, 7rem) clamp(3.5rem, 6vw, 6rem); position: relative; overflow: clip; }
.page-hero .lead { margin-top: 1.3rem; }
.page-hero-deco {
  position: absolute; width: 300px; height: 300px; right: -80px; top: -120px;
  background: radial-gradient(circle at 35% 35%, var(--neon), var(--orange));
  border-radius: 54% 46% 50% 50% / 48% 55% 45% 52%; opacity: 0.85;
}
.page-hero .container { position: relative; z-index: 1; }

.feature-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.25rem; }
.feature-card {
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md);
  padding: 1.75rem 1.75rem 1.9rem;
  display: grid; gap: 0.6rem; align-content: start;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.feature-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-card); }
.feature-card .pillar-icon { margin-bottom: 0.4rem; }
.feature-card h3 { font-size: 1.2rem; margin: 0; }
.feature-card p { color: var(--ink-soft); font-size: 1.0rem; margin: 0; }

/* "Im Detail": links Baustein-Kacheln, die beim Scrollen aufeinander stapeln,
   rechts ein sticky mitlaufendes Bild über die volle Höhe */
.detail-layout { display: grid; grid-template-columns: minmax(0, 1.05fr) minmax(0, 0.95fr); gap: clamp(1.5rem, 3vw, 3rem); align-items: start; }
.detail-stack { display: grid; gap: 1.4rem; }
.detail-card {
  position: sticky; top: calc(88px + var(--stack-i, 0) * 16px);
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg);
  padding: clamp(1.6rem, 2.6vw, 2.5rem);
  box-shadow: var(--shadow-card);
}
.detail-card h3 { font-size: clamp(1.3rem, 1.15rem + 0.7vw, 1.7rem); margin-bottom: 0.6rem; }
.detail-card h3 span { color: var(--bronze-text); display: block; font-size: var(--fs-label); letter-spacing: 0.11em; text-transform: uppercase; margin-bottom: 0.5rem; }
.detail-card ul { margin: 1rem 0 0; padding: 0; list-style: none; display: grid; gap: 0.55rem; }
.detail-card ul li { display: grid; grid-template-columns: 24px 1fr; gap: 0.6rem; color: var(--ink-soft); font-size: 1.02rem; }
.detail-card ul svg { color: var(--bronze); margin-top: 0.25rem; }
.detail-media { position: sticky; top: 88px; height: calc(100vh - 88px - 1.5rem); min-height: 480px; }
.detail-media img { width: 100%; height: 100%; object-fit: cover; object-position: 50% 0%; border-radius: var(--r-lg); box-shadow: var(--shadow-card); }

/* Wartung: zwei Wege */
.choice-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
.choice-card { border-radius: var(--r-lg); padding: clamp(1.75rem, 3vw, 2.5rem); display: grid; gap: 0.4rem; align-content: start; }
.choice-card--a { background: var(--paper); border: 1px solid var(--line); }
.choice-card--b { background: var(--cream); border: 1px solid rgba(181, 116, 54, 0.3); }
.choice-card .tag { justify-self: start; margin-bottom: 0.6rem; }
.choice-card ul { margin: 0.9rem 0 0; padding: 0; list-style: none; display: grid; gap: 0.5rem; }
.choice-card ul li { display: grid; grid-template-columns: 24px 1fr; gap: 0.55rem; color: var(--ink-soft); font-size: 1.0rem; }
.choice-card ul svg { color: var(--bronze); margin-top: 0.22rem; }

/* ================= CTA-Band ================= */
.cta-band { background: var(--ink); color: var(--warm); position: relative; overflow: clip; }
.cta-band::before {
  content: ""; position: absolute; width: 460px; height: 460px; left: -180px; top: -230px;
  background: radial-gradient(circle at 40% 40%, var(--orange), transparent 70%); opacity: 0.35;
}
.cta-band .container { position: relative; z-index: 1; display: grid; gap: 1.4rem; justify-items: start; }
.cta-band h2 { margin-bottom: 0; max-width: 20ch; }
.cta-band p { color: rgba(247, 246, 241, 0.78); max-width: 55ch; margin: 0; }

/* ================= Kontaktseite ================= */
.contact-grid { display: grid; grid-template-columns: 0.9fr 1.1fr; gap: clamp(2rem, 4vw, 4.5rem); align-items: start; }
.contact-aside { display: grid; gap: 1.5rem; position: sticky; top: 110px; }
.contact-channel {
  display: grid; grid-template-columns: 52px 1fr; gap: 1.1rem; align-items: center;
  background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-md);
  padding: 1.2rem 1.4rem; text-decoration: none;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}
.contact-channel:hover { transform: translateY(-3px); box-shadow: var(--shadow-card); }
.contact-channel .pillar-icon { width: 52px; height: 52px; }
.contact-channel strong { display: block; }
.contact-channel span { color: var(--ink-soft); font-size: 0.95rem; word-break: break-word; }
.contact-note { background: var(--cream-soft); border: 1px solid rgba(181, 116, 54, 0.25); border-radius: var(--r-md); padding: 1.4rem 1.5rem; font-size: 0.98rem; color: var(--ink-soft); }
.contact-note strong { color: var(--ink); }

/* Formular */
.form-card { background: var(--paper); border: 1px solid var(--line); border-radius: var(--r-lg); padding: clamp(1.5rem, 3vw, 2.75rem); box-shadow: var(--shadow-card); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1.15rem 1.25rem; }
.form-field { display: grid; gap: 0.35rem; }
.form-field--full { grid-column: 1 / -1; }
.form-field label { font-weight: 700; font-size: 0.98rem; }
.form-field label .opt { font-weight: 500; color: var(--ink-soft); font-size: 0.86rem; }
.form-field input, .form-field select, .form-field textarea {
  font-family: var(--font); font-size: 1.02rem; color: var(--ink);
  background: var(--warm); border: 2px solid transparent; border-radius: 12px;
  padding: 0.85rem 1rem; width: 100%;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.form-field textarea { resize: vertical; min-height: 130px; }
.form-field input:focus, .form-field select:focus, .form-field textarea:focus {
  outline: none; border-color: var(--ink); background: var(--paper);
}
.form-field.has-error input, .form-field.has-error select, .form-field.has-error textarea { border-color: #c2431f; background: #fdf1ec; }
.field-error { color: #a53314; font-size: 0.88rem; font-weight: 600; margin: 0; display: none; }
.form-field.has-error .field-error { display: block; }
.form-consent { grid-column: 1 / -1; display: grid; grid-template-columns: 26px 1fr; gap: 0.7rem; align-items: start; }
.form-consent input { width: 20px; height: 20px; margin-top: 0.2rem; accent-color: var(--ink); }
.form-consent label { font-size: 0.94rem; color: var(--ink-soft); font-weight: 500; }
.form-hint { grid-column: 1 / -1; font-size: 0.9rem; color: var(--ink-soft); margin: 0; }
.form-success {
  background: var(--cream-soft); border: 1px solid rgba(181, 116, 54, 0.3); border-radius: var(--r-md);
  padding: 2.25rem; text-align: left; display: grid; gap: 0.5rem; justify-items: start;
}
.form-success .pillar-icon { background: var(--neon); border-color: var(--neon); color: var(--ink); }

/* ================= Footer ================= */
.site-footer { background: var(--ink); color: rgba(247, 246, 241, 0.82); padding: clamp(3.5rem, 6vw, 5.5rem) 0 2rem; }
.footer-grid { display: grid; grid-template-columns: 1.4fr 0.8fr 0.8fr 1fr; gap: 2.5rem; padding-bottom: 3rem; border-bottom: 1px solid rgba(247, 246, 241, 0.14); }
.footer-brand img { height: 150px; width: auto; margin: -34px 0 0 -10px; }
.footer-brand p { max-width: 34ch; font-size: 0.98rem; }
.site-footer .footer-h { color: var(--warm); font-weight: 700; font-size: 0.9rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.1rem; }
.site-footer ul { list-style: none; margin: 0; padding: 0; display: grid; gap: 0.55rem; }
.site-footer a { color: rgba(247, 246, 241, 0.82); text-decoration: none; }
.site-footer a:hover { color: var(--neon); }
.footer-meta { display: flex; flex-wrap: wrap; gap: 0.75rem 2rem; justify-content: space-between; padding-top: 1.75rem; font-size: 0.9rem; color: rgba(247, 246, 241, 0.55); }
.footer-meta ul { display: flex; gap: 1.5rem; }

/* ================= Scroll-Reveal ================= */
.reveal { opacity: 0; transform: translateY(16px); transition: opacity 0.6s ease, transform 0.6s ease; }
.reveal.is-visible { opacity: 1; transform: none; }

/* ================= Platzhalterseiten (Impressum / Datenschutz) ================= */
.legal-page { max-width: 760px; }
.legal-page .placeholder-card { margin-top: 2rem; }

/* ============================================================
   Responsive
   ============================================================ */
@media (max-width: 1200px) {
  .signal { padding-block: 1rem; }
}

@media (max-width: 1024px) {
  :root { --nav-h: 76px; }
  .navbar.is-scrolled .navbar-inner { height: var(--nav-h); } /* Menü-Overlay bleibt bündig */
  .nav-links { display: none; }
  .burger { display: block; }
  .nav-logo img { height: 100px; }
  .navbar.is-scrolled .nav-logo img { height: 88px; }

  .hero-inner { grid-template-columns: 1fr; min-height: 0; align-items: start; }
  .hero-copy { padding-bottom: 0; }
  .hero-stage { margin-top: 1.5rem; max-width: 520px; justify-self: center; width: 100%; }
  .hero-portrait { width: min(420px, 84%); }

  .split, .about-split { grid-template-columns: 1fr; }
  .case-grid { grid-template-columns: 1fr; }
  .case-study, .case-study--flip { grid-template-columns: 1fr; }
  .case-study--flip .case-study-media { order: 0; }
  .feature-grid { grid-template-columns: 1fr 1fr; }
  .detail-layout { grid-template-columns: 1fr; }
  .detail-media { position: static; order: -1; height: auto; min-height: 0; }
  .detail-media img { height: auto; aspect-ratio: 4 / 3; object-position: 50% 33%; }
  .invest-card { grid-template-columns: 1fr; }
  .contact-grid { grid-template-columns: 1fr; }
  .contact-aside { position: static; }
  .footer-grid { grid-template-columns: 1fr 1fr; }
  .about-photo { width: 100%; max-width: 560px; margin-inline: auto; }
}

@media (max-width: 767px) {
  .marquee-row--b { display: none; } /* Mobil nur eine Banner-Reihe */
  .m-card { width: min(78vw, 320px); }
  .feature-grid { grid-template-columns: 1fr; }
  .choice-grid { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }
  .case-facts { grid-template-columns: 1fr; }
  .footer-grid { grid-template-columns: 1fr; gap: 2rem; }
  .step { grid-template-columns: 1fr; gap: 0.6rem; }
  .btn-row .btn { width: 100%; }
  .case-study-media .mini-shot { display: none; }
  .hero-trust { gap: 0.5rem 1.1rem; }
  .footer-brand img { height: 120px; margin-top: -24px; }
}

@media (max-width: 480px) {
  h1 { hyphens: auto; } /* lange Wörter wie "Komplettlösung" sauber trennen */
}

/* ============================================================
   Reduzierte Bewegung: alles sofort sichtbar, keine Endlosanimationen
   ============================================================ */
@media (prefers-reduced-motion: reduce) {
  html { scroll-behavior: auto; }
  *, *::before, *::after { animation-duration: 0.01ms !important; animation-iteration-count: 1 !important; transition-duration: 0.01ms !important; }
  .reveal { opacity: 1; transform: none; }
}

/* ---------- Kleine Helfer ---------- */
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));

/* ---------- Wiederverwendbare Bausteine ---------- */
function btn({ href, label, style = 'primary', dark = false, lg = false, extern = false, arrow = true }) {
  const cls = ['btn', `btn--${style}`, dark ? 'btn--on-dark' : '', lg ? 'btn--lg' : ''].filter(Boolean).join(' ');
  const target = extern ? ' target="_blank" rel="noopener"' : '';
  return `<a class="${cls}" href="${href}"${target}>${esc(label)}${arrow ? ICONS.arrow : ''}</a>`;
}

function tagBadge(tag) {
  const map = {
    kunde: ['tag--kunde', 'Kundenprojekt'],
    launch: ['tag--launch', 'Launchphase'],
    konzept: ['tag--konzept', 'Designkonzept'],
  };
  const [cls, label] = map[tag] || map.konzept;
  return `<span class="tag ${cls}">${label}</span>`;
}

/* Browser-Mockup-Karte für den Projekt-Banner */
function bannerCard(p, i) {
  return `
  <figure class="m-card${i % 3 === 1 ? ' m-card--tall' : ''}" role="group" aria-label="${esc(p.titel)}">
    <div class="m-card-bar" aria-hidden="true"><i></i><i></i><i></i><span class="m-card-url">${esc(p.url)}</span></div>
    <img src="${IMAGES[p.img]}" alt="Website-Ansicht: ${esc(p.titel)}" loading="lazy" width="640" height="400">
    <figcaption class="m-card-meta"><strong>${esc(p.titel)}</strong>${tagBadge(p.tag)}</figcaption>
  </figure>`;
}

/* ---- Navigation: kompakter beim Scrollen + Mobilmenü ----
   Einmalig registrierte, delegierte Listener - überleben
   jeden Routenwechsel ohne doppelte Registrierung. ---- */
function closeMobileMenu() {
  const menu = document.getElementById('mobile-menu');
  const burger = document.getElementById('burger');
  if (!menu || !burger) return;
  menu.classList.remove('is-open');
  burger.setAttribute('aria-expanded', 'false');
  burger.setAttribute('aria-label', 'Menü öffnen');
}

function initGlobalNav() {
  window.addEventListener('scroll', () => {
    const navbar = document.getElementById('navbar');
    if (navbar) navbar.classList.toggle('is-scrolled', window.scrollY > 24);
  }, { passive: true });

  document.addEventListener('click', (e) => {
    const burger = e.target.closest('#burger');
    if (burger) {
      const menu = document.getElementById('mobile-menu');
      const open = menu.classList.toggle('is-open');
      burger.setAttribute('aria-expanded', String(open));
      burger.setAttribute('aria-label', open ? 'Menü schließen' : 'Menü öffnen');
      if (open) menu.querySelector('a').focus();
      return;
    }
    if (e.target.closest('.mobile-menu a')) closeMobileMenu();
  });

  document.addEventListener('keydown', (e) => {
    const menu = document.getElementById('mobile-menu');
    if (e.key === 'Escape' && menu && menu.classList.contains('is-open')) {
      closeMobileMenu();
      document.getElementById('burger').focus();
    }
  });
}

/* ---- Scroll-Reveal (respektiert reduzierte Bewegung) ---- */
function initReveal() {
  const items = document.querySelectorAll('.reveal');
  if (reduceMotion.matches || !('IntersectionObserver' in window)) {
    items.forEach((i) => i.classList.add('is-visible'));
    return;
  }
  const io = new IntersectionObserver((entries) => {
    entries.forEach((e) => {
      if (e.isIntersecting) { e.target.classList.add('is-visible'); io.unobserve(e.target); }
    });
  }, { threshold: 0.12, rootMargin: '0px 0px -5% 0px' });
  items.forEach((i) => io.observe(i));
}

/* ============================================================
   PROJEKT-BANNER
   Endlos-Marquee mit requestAnimationFrame.
   - Zwei Reihen, gegenläufig, unterschiedliche Geschwindigkeit
   - Hover bremst die Reihe sanft ab (gleitende Anpassung,
     kein abrupter Stopp, kein Sprung)
   - prefers-reduced-motion: statisch & horizontal scrollbar
   Für Elementor: dieser Block lässt sich als Custom-HTML-Widget
   mit demselben CSS/JS übernehmen (siehe Doku).
   ============================================================ */
let marqueeRaf = null;
let marqueeResizeHandler = null;
function initMarquee() {
  if (marqueeRaf) { cancelAnimationFrame(marqueeRaf); marqueeRaf = null; }
  if (marqueeResizeHandler) { window.removeEventListener('resize', marqueeResizeHandler); marqueeResizeHandler = null; }
  const wrap = document.getElementById('marquee');
  if (!wrap) return;

  const rows = [...wrap.querySelectorAll('.marquee-row')];

  if (reduceMotion.matches) {
    wrap.classList.add('is-static'); // keine Endlosbewegung, Inhalte bleiben vollständig erreichbar
    return;
  }

  const state = rows.map((row) => {
    // Inhalt verdreifachen für eine nahtlose Schleife auch auf sehr breiten Displays
    const seq = row.innerHTML;
    row.innerHTML = seq + seq + seq;
    return { row, pos: 0, seqWidth: 0, speed: parseFloat(row.dataset.speed), factor: 1, target: 1 };
  });

  // Mobil läuft der Banner spürbar langsamer
  let speedScale = 1;
  const measure = () => {
    speedScale = window.matchMedia('(max-width: 767px)').matches ? 0.6 : 1;
    state.forEach((s) => { s.seqWidth = s.row.scrollWidth / 3; });
  };
  measure();
  marqueeResizeHandler = measure;
  window.addEventListener('resize', marqueeResizeHandler);

  state.forEach((s) => {
    // Sanftes Abbremsen beim Überfahren mit Maus oder Fokus
    s.row.addEventListener('mouseenter', () => { s.target = 0.15; });
    s.row.addEventListener('mouseleave', () => { s.target = 1; });
  });

  let last = performance.now();
  const tick = (now) => {
    const dt = Math.min((now - last) / 1000, 0.05);
    last = now;
    state.forEach((s) => {
      // Gleitende Annäherung an die Zielgeschwindigkeit (exponentielles Glätten)
      s.factor += (s.target - s.factor) * Math.min(1, dt * 4);
      s.pos += s.speed * speedScale * s.factor * dt;
      if (!s.seqWidth) return;
      const shift = ((s.pos % s.seqWidth) + s.seqWidth) % s.seqWidth;
      s.row.style.transform = `translate3d(${-shift}px,0,0)`;
    });
    marqueeRaf = requestAnimationFrame(tick);
  };
  marqueeRaf = requestAnimationFrame(tick);
}

function initFaq() {

/* ============================================================
   KONTAKTFORMULAR
   Nur Prototyp-Validierung - KEIN echter Versand.
   >>> HIER SPÄTER DEN FORMULARVERSAND ANBINDEN <<<
   (z. B. Elementor-Pro-Formular-Widget mit E-Mail-Action oder
   ein WordPress-Formular-Plugin; die Felder unten 1:1 übernehmen)
   ============================================================ */
function initForm() {
  const form = document.getElementById('kontakt-form');
  if (!form) return;

  const setError = (id, on) => {
    const field = document.getElementById(id);
    const wrap = field.closest('.form-field');
    wrap.classList.toggle('has-error', on);
    field.setAttribute('aria-invalid', String(on));
    const err = document.getElementById('err-' + id);
    if (err) field.setAttribute('aria-describedby', on ? 'err-' + id : '');
  };

  const validate = () => {
    let firstBad = null;
    const need = (id, ok) => {
      setError(id, !ok);
      if (!ok && !firstBad) firstBad = document.getElementById(id);
    };
    const v = (id) => document.getElementById(id).value.trim();
    need('f-name', v('f-name').length > 1);
    need('f-firma', v('f-firma').length > 1);
    need('f-email', /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/.test(v('f-email')));
    const web = v('f-website');
    need('f-website', web === '' || /^(https?:\/\/)?[\w-]+(\.[\w-]+)+/.test(web));
    need('f-projekt', v('f-projekt') !== '');
    need('f-budget', v('f-budget') !== '');
    need('f-nachricht', v('f-nachricht').length > 10);
    need('f-datenschutz', document.getElementById('f-datenschutz').checked);
    return firstBad;
  };

  // Fehler live zurücknehmen, sobald das Feld korrigiert wird
  form.addEventListener('input', (e) => {
    const wrap = e.target.closest('.form-field');
    if (wrap && wrap.classList.contains('has-error')) validate();
  });

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const firstBad = validate();
    if (firstBad) { firstBad.focus(); return; }

    // >>> HIER SPÄTER: fetch()/Action zum echten Backend-Versand einsetzen <<<
    form.hidden = true;
    const ok = document.getElementById('form-success');
    ok.hidden = false;
    ok.focus();
  });
}
